{% extends 'base.html' %}

{% block content %}
    <div class="container mt-5">
        <h1 class="text-center text-primary mb-4">
            <i class="fas fa-user-edit me-2"></i> Editar Agente
        </h1>

        {% if messages %}
            <div class="alert-container">
                {% for message in messages %}
                    <div class="alert {{ message.tags }} alert-dismissible fade show" role="alert">
                        {{ message }}
                        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Cerrar"></button>
                    </div>
                {% endfor %}
            </div>
        {% endif %}


        <!-- Formulario -->
        <form method="post" class="shadow p-4 rounded bg-light">
            {% csrf_token %}
            
            <!-- Campo Nombre -->
            <div class="mb-3">
                <label for="nombre" class="form-label">Nombre:</label>
                <input type="text" class="form-control" id="nombre" name="nombre" value="{{ agente.nombre }}" required>
            </div>

            <!-- Campo Apellido -->
            <div class="mb-3">
                <label for="apellido" class="form-label">Apellido:</label>
                <input type="text" class="form-control" id="apellido" name="apellido" value="{{ agente.apellido }}" required>
            </div>

            <!-- Campo Nombre de Usuario -->
            <div class="mb-3">
                <label for="nombre_usuario" class="form-label">Nombre de Usuario:</label>
                <input type="text" class="form-control" id="nombre_usuario" name="nombre_usuario" value="{{ agente.nombre_usuario }}" required>
            </div>

            <!-- Campo Email -->
            <div class="mb-3">
                <label for="email" class="form-label">Correo Electrónico:</label>
                <input type="email" class="form-control" id="email" name="email" value="{{ agente.email }}" required>
            </div>

            <!-- Campo Teléfono -->
            <div class="mb-3">
                <label for="telefono" class="form-label">Teléfono:</label>
                <input type="text" class="form-control" id="telefono" name="telefono" value="{{ agente.telefono }}" required>
            </div>

            <!-- Campo Contraseña (opcional) -->
            <div class="mb-3">
                <label for="password" class="form-label">Nueva Contraseña (opcional):</label>
                <input type="password" class="form-control" id="password" name="password" placeholder="Ingresa una nueva contraseña">
            </div>

            <!-- Botones -->
            <div class="text-center">
                <button type="submit" class="btn btn-primary">
                    <i class="fas fa-save me-2"></i> Guardar Cambios
                </button>
                <a href="{% url 'usuarios_agentes' %}" class="btn btn-secondary ms-2">
                    <i class="fas fa-arrow-left me-2"></i> Cancelar
                </a>
            </div>
        </form>
    </div>
{% endblock %}
