{% extends 'base.html' %}

{% block content %}
    <div class="container mt-5">
        <!-- Título del formulario -->
        <h1 class="text-center text-primary mb-4">
            <i class="fas fa-users-cog me-2"></i> Editar Grupo
        </h1>

        <!-- Formulario -->
        <form method="post" class="shadow p-4 rounded bg-light">
            {% csrf_token %}
            
            <!-- Campo Nombre -->
            <div class="mb-3">
                <label for="nombre" class="form-label">Nombre del Grupo:</label>
                <input type="text" class="form-control" id="nombre" name="nombre" value="{{ grupo.nombre }}" placeholder="Ingresa el nombre del grupo" required>
            </div>

            <!-- Campo Descripción -->
            <div class="mb-3">
                <label for="descripcion" class="form-label">Descripción:</label>
                <textarea class="form-control" id="descripcion" name="descripcion" rows="5" placeholder="Ingresa una descripción del grupo" required>{{ grupo.descripcion }}</textarea>
            </div>

            <!-- Botones -->
            <div class="text-center">
                <button type="submit" class="btn btn-primary">
                    <i class="fas fa-save me-2"></i> Guardar Cambios
                </button>
                <a href="{% url 'usuarios_grupos_agentes' %}" class="btn btn-secondary ms-2">
                    <i class="fas fa-arrow-left me-2"></i> Cancelar
                </a>
            </div>
        </form>
    </div>
{% endblock %}
