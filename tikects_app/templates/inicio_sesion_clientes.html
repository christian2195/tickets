{% extends 'base.html' %}

{% block content %}
    <div class="container mt-5">
        <!-- Títulos -->
        <h1 class="text-center text-primary mb-4">
            <i class="fas fa-user-circle me-2"></i> Bienvenidos Clientes
        </h1>
        <h2 class="text-center text-muted mb-4">Inicia sesión para acceder a tu cuenta</h2>

        <!-- Formulario -->
        <div class="row justify-content-center">
            <div class="col-md-6">
                <form method="POST" onsubmit="showLoadingButton(event)" class="shadow p-4 rounded bg-light">
                    {% if error %}
                        <div class="alert alert-danger text-center">
                            {{ error }}
                        </div>
                    {% endif %}
                    {% csrf_token %}

                    <!-- Campo Usuario -->
                    <div class="mb-3">
                        <label for="username" class="form-label">Usuario:</label>
                        <input type="text" name="username" id="username" class="form-control" placeholder="Escribe tu usuario aquí" required>
                    </div>

                    <!-- Campo Contraseña -->
                    <div class="mb-3">
                        <label for="clave" class="form-label">Contraseña:</label>
                        <input type="password" name="clave" id="clave" class="form-control" placeholder="Contraseña" required>
                    </div>

                    <!-- Botón Ingresar -->
                    <div class="text-center">
                        <button id="submitButton" type="submit" class="btn btn-primary btn-lg">
                            <span id="buttonText">
                                <i class="fas fa-sign-in-alt me-2"></i> Ingresar
                            </span>
                            <span id="loadingSpinner" class="spinner-border spinner-border-sm d-none" role="status" aria-hidden="true"></span>
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- JavaScript -->
    <script>
        function showLoadingButton(event) {
            event.preventDefault(); // Elimina si no necesitas prevenir la redirección inmediata
            const submitButton = document.getElementById('submitButton');
            const buttonText = document.getElementById('buttonText');
            const loadingSpinner = document.getElementById('loadingSpinner');

            // Cambiar el texto por el spinner
            buttonText.classList.add('d-none');
            loadingSpinner.classList.remove('d-none');

            // Simula un pequeño retraso (ejemplo de procesamiento)
            setTimeout(() => {
                event.target.submit();
            }, 1000); // Redirigir después de 1 segundo
        }
    </script>
{% endblock %}
