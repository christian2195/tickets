{% extends 'base.html' %}

{% block content %}
    <div class="container mt-5">
        <!-- Encabezado -->
        <h1 class="text-center text-primary mb-4">
            <i class="fas fa-plus-circle me-2"></i> Crear Cola
        </h1>

        <!-- Formulario -->
        <form action="" method="POST" class="shadow p-4 rounded bg-light">
            {% csrf_token %}
            <!-- Campo Nombre -->
            <div class="mb-3">
                <label for="colas" class="form-label">Nombre:</label>
                <input type="text" name="colas" id="colas" class="form-control" placeholder="Ingresa el nombre de la cola" required>
            </div>

            <!-- Campo Descripcion -->
            <div class="mb-3">
                <label for="colas_descripcion" class="form-label">Descripcion:</label>
                <input type="text" name="colas_descripcion" id="colas_descripcion" class="form-control" placeholder="Ingresa la descripcion de la cola" required>
            </div>

            <!-- Botón Crear -->
            <div class="text-center">
                <button type="submit" class="btn btn-primary">
                    <i class="fas fa-check-circle me-2"></i> Crear
                </button>
            </div>
        </form>
    </div>
{% endblock %}
