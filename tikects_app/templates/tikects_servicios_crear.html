{% extends 'base.html' %}

{% block content %}
    <div class="container mt-5">
        <!-- Título del formulario -->
        <h1 class="text-center text-success mb-4">
            <i class="fas fa-cogs me-2"></i> Crear Servicio
        </h1>

        <!-- Formulario -->
        <form action="" method="POST" class="shadow p-4 rounded bg-light">
            {% csrf_token %}
            <!-- Campo Nombre -->
            <div class="mb-3">
                <label for="servicio" class="form-label">Nombre:</label>
                <input type="text" name="servicio" id="servicio" class="form-control" placeholder="Ingresa el nombre del servicio" required>
            </div>

            <!-- Campo Descripcion -->
            <div class="mb-3">
                <label for="servicio_descripcion" class="form-label">Descripcion: </label>
                <input type="text" name="servicio_descripcion" id="servicio_descripcion" class="form-control" placeholder="Ingresa la descripcion del servicio" required>
            </div>

            <!-- Botón Crear -->
            <div class="text-center">
                <button type="submit" class="btn btn-success">
                    <i class="fas fa-check-circle me-2"></i> Crear
                </button>
            </div>
        </form>
    </div>
{% endblock %}
