{% extends 'base.html' %}

{% block content %}
    <div class="container mt-5">
        <!-- Título principal -->
        <h1 class="text-center text-success mb-4">
            <i class="fas fa-user-plus me-2"></i> Agregar Agente a Grupo
        </h1>

        <!-- Mostrar mensaje de error si existe -->
        {% if error %}
            <div class="alert alert-danger" role="alert">
                {{ error }}
            </div>
        {% endif %}

        <!-- Formulario -->
        <form method="post" class="shadow p-4 rounded bg-light">
            {% csrf_token %}
            
            <!-- Selección de Agente -->
            <div class="mb-3">
                <label for="agente" class="form-label">Seleccionar Agente:</label>
                <select class="form-select" id="agente" name="agente" required>
                    <option value="" disabled selected>-- Selecciona un agente --</option>
                    {% for agente in agentes %}
                        <option value="{{ agente.id }}">{{ agente.usuario.username }} ({{ agente.nombre }} {{ agente.apellido }})</option>
                    {% endfor %}
                </select>
            </div>

            <!-- Selección de Grupo -->
            <div class="mb-3">
                <label for="grupo" class="form-label">Seleccionar Grupo:</label>
                <select class="form-select" id="grupo" name="grupo" required>
                    <option value="" disabled selected>-- Selecciona un grupo --</option>
                    {% for grupo in grupos %}
                        <option value="{{ grupo.id }}">{{ grupo.nombre }}</option>
                    {% endfor %}
                </select>
            </div>

            <!-- Botón de envío -->
            <div class="text-center">
                <button type="submit" class="btn btn-success">
                    <i class="fas fa-check-circle me-2"></i> Asignar Agente
                </button>
            </div>
        </form>
    </div>
{% endblock %}
