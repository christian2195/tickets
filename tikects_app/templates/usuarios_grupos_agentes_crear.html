{% extends 'base.html' %}

{% block content %}
    <div class="container mt-5">
        <!-- Encabezado -->
        <h1 class="text-center text-success mb-4">
            <i class="fas fa-user-plus me-2"></i> Crear Grupo
        </h1>

        <!-- Formulario -->
        <form method="post" class="shadow p-4 rounded bg-light">
            {% csrf_token %}
            
            <!-- Campo Nombre del Grupo -->
            <div class="mb-3">
                <label for="nombre_grupo" class="form-label">Nombre del Grupo:</label>
                <input type="text" name="nombre_grupo" id="nombre_grupo" class="form-control" placeholder="Introduce el nombre del grupo" required>
            </div>
            
            <!-- Campo Descripción -->
            <div class="mb-3">
                <label for="descripcion_grupo" class="form-label">Descripción:</label>
                <textarea name="descripcion_grupo" id="descripcion_grupo" class="form-control" rows="3" placeholder="Introduce una descripción del grupo"></textarea>
            </div>
            
            <!-- Botón Crear -->
            <div class="text-center">
                <button type="submit" class="btn btn-success">
                    <i class="fas fa-check-circle me-2"></i> Crear Grupo
                </button>
            </div>
        </form>
    </div>
{% endblock %}
